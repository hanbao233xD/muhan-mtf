<!DOCTYPE html>
<html lang="zh">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木汗ICU</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #FF0000, #FF7F00, #FFFF00, #00FF00, #0000FF, #4B0082, #8B00FF);
            background-size: 400% 400%;
            animation: rainbow 10s ease infinite;
            color: #fff;
            line-height: 1.6;
        }

        @keyframes rainbow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: rgba(0, 0, 0, 0.5);
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            color: #fff;
        }

        header p {
            font-size: 1.2rem;
            margin-top: 10px;
            color: #f0f0f0;
        }

        .container {
            margin: 30px auto;
            max-width: 900px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .profile img {
            border-radius: 50%;
            border: 5px solid #fff;
            width: 150px;
            height: 150px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .profile h2 {
            font-size: 2.5rem;
            margin: 10px 0 5px;
            color: #ffcc00;
        }

        .profile p {
            font-size: 1.2rem;
            color: #f0f0f0;
        }

        .btn-qq {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 1.2rem;
            color: white;
            background: linear-gradient(45deg, #1e90ff, #ff1493);
            border: none;
            border-radius: 25px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        .btn-qq:hover {
            background: linear-gradient(45deg, #ff1493, #1e90ff);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .info-section {
            margin-top: 40px;
        }

        .info-section h3 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #ffcc00;
        }

        .info-section p {
            font-size: 1.1rem;
            color: #f0f0f0;
            line-height: 1.8;
        }

        .timeline {
            position: relative;
            margin: 40px 0;
            padding-left: 30px;
            border-left: 3px solid #ffcc00;
        }

        .timeline-item {
            margin-bottom: 30px;
            position: relative;
        }

        .timeline-item:before {
            content: '';
            position: absolute;
            left: -38px;
            top: 5px;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #ffcc00;
        }

        .timeline-item h4 {
            color: #ffcc00;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .timeline-item p {
            margin: 5px 0;
        }

        .quote {
            font-style: italic;
            padding: 20px;
            margin: 30px 0;
            border-left: 4px solid #ffcc00;
            background: rgba(255, 255, 255, 0.1);
        }

        .interests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .interest-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .interest-card h4 {
            color: #ffcc00;
            margin-top: 0;
        }

        .game-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
        }

        .game-section h3 {
            color: #ffcc00;
            text-align: center;
            margin-top: 0;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }

        .quiz-option {
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .quiz-option:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .quiz-option.selected {
            background: rgba(255, 204, 0, 0.3);
            border: 2px solid #ffcc00;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }

        .activism-post {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            border-left: 4px solid #ff69b4;
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            object-fit: cover;
        }

        .post-username {
            font-weight: bold;
            color: #ffcc00;
        }

        .post-content {
            line-height: 1.6;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            color: #aaa;
        }

        .post-action {
            cursor: pointer;
        }

        .post-action:hover {
            color: #ffcc00;
        }

        .extreme-feminist {
            color: #ff69b4;
            font-weight: bold;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: #ccc;
        }

        .section-divider {
            height: 2px;
            background: linear-gradient(to right, transparent, #ffcc00, transparent);
            margin: 40px 0;
        }
    </style>
</head>

<body>
    <h1>
        Hello World

    </h1>
</body>

</html>
